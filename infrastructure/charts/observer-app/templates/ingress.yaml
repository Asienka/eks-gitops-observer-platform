apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: observer-app-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    # Rate limiting annotations
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    # Whitelist specific IPs or CIDR ranges to bypass rate limiting
    nginx.ingress.kubernetes.io/limit-whitelist: "127.0.0.1, 172.16.0.0/12, 10.0.0.0/8"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: observer-app-platform-service
            port:
              number: 80