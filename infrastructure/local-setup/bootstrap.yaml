---
- name: Bootstrap Local Kubernetes Environment
  hosts: localhost
  connection: local
  gather_facts: true

  vars_prompt:
    - name: grafana_password
      prompt: "Enter Grafana admin password"
      private: true
      confirm: true

  vars:
    argocd_version: "v2.13.3"
    kubectl_version: "v1.31.0"
    kind_config: "{{ playbook_dir }}/kind-config.yaml"
    local_bin: "{{ ansible_env.HOME }}/.local/bin"

  tasks:

    # ── Prerequisites ─────────────────────────────────────────────────────────
    - name: Ensure ~/.local/bin exists
      ansible.builtin.file:
        path: "{{ local_bin }}"
        state: directory
        mode: '0755'

    - name: Install kind
      ansible.builtin.shell: |
        curl -Lo {{ local_bin }}/kind \
          https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
        chmod +x {{ local_bin }}/kind
      args:
        executable: /bin/bash
        creates: "{{ local_bin }}/kind"

    - name: Install kubectl
      ansible.builtin.shell: |
        curl -Lo {{ local_bin }}/kubectl \
          "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x {{ local_bin }}/kubectl
      args:
        executable: /bin/bash
        creates: "{{ local_bin }}/kubectl"

    # ── Kind cluster ──────────────────────────────────────────────────────────
    - name: Create Kind cluster
      ansible.builtin.command: "{{ local_bin }}/kind create cluster --config {{ kind_config }}"
      register: kind_result
      failed_when:
        - kind_result.rc != 0
        - "'already exist' not in kind_result.stderr"
      changed_when: "'already exist' not in kind_result.stderr"
    
    # ── Wait for Kubernetes API ───────────────────────────────────────────────
    - name: Wait for Kubernetes API Server to be healthy and responsive
      ansible.builtin.command: "{{ local_bin }}/kubectl cluster-info"
      register: kube_cluster_info
      until: kube_cluster_info.rc == 0
      retries: 20
      delay: 6
      changed_when: false

    # ── ArgoCD ────────────────────────────────────────────────────────────────
    - name: Create namespace argocd
      ansible.builtin.command: "{{ local_bin }}/kubectl create namespace argocd"
      register: ns_argocd
      failed_when:
        - ns_argocd.rc != 0
        - "'already exist' not in ns_argocd.stderr"
      changed_when: "'already exist' not in ns_argocd.stderr"

    - name: Install ArgoCD {{ argocd_version }}
      ansible.builtin.command: >
        {{ local_bin }}/kubectl apply -n argocd
        -f https://raw.githubusercontent.com/argoproj/argo-cd/{{ argocd_version }}/manifests/install.yaml

    - name: Wait for ArgoCD to be ready
      ansible.builtin.command: >
        {{ local_bin }}/kubectl wait deployment argocd-server
        -n argocd
        --for=condition=Available
        --timeout=30s
      register: argocd_ready
      until: argocd_ready.rc == 0
      retries: 10
      delay: 15

    # ── Grafana credentials ───────────────────────────────────────────────────
    - name: Create namespace monitoring
      ansible.builtin.command: "{{ local_bin }}/kubectl create namespace monitoring"
      register: ns_monitoring
      failed_when:
        - ns_monitoring.rc != 0
        - "'already exist' not in ns_monitoring.stderr"
      changed_when: "'already exist' not in ns_monitoring.stderr"

    - name: Write grafana secret manifest
      ansible.builtin.copy:
        content: |
          apiVersion: v1
          kind: Secret
          metadata:
            name: grafana-admin-credentials
            namespace: monitoring
          type: Opaque
          stringData:
            admin-user: admin
            admin-password: "{{ grafana_password }}"
        dest: /tmp/grafana-secret.yaml
        mode: '0600'
      no_log: true

    - name: Apply grafana secret
      ansible.builtin.command: "{{ local_bin }}/kubectl apply -f /tmp/grafana-secret.yaml"
      no_log: true

    - name: Remove grafana secret temp file
      ansible.builtin.file:
        path: /tmp/grafana-secret.yaml
        state: absent

    - name: Deploy Root Application in ArgoCD
      ansible.builtin.command: "{{ local_bin }}/kubectl apply -f {{ playbook_dir }}/../argocd/root-application.yaml" 
      register: root_app_result

    - name: Wait for Root Application to be registered
      ansible.builtin.command: "{{ local_bin }}/kubectl get applications.argoproj.io -n argocd root-application"
      register: root_app_check
      until: root_app_check.rc == 0
      retries: 5
      delay: 5
      changed_when: false