apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observer-app-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Asienka/eks-gitops-observer.git'
    targetRevision: main
    path: infrastructure/charts/observer-app
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status/terminatingReplicas